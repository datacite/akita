name: Run Tests on Cypress.IO
on:
  workflow_call:
    secrets:
      NEXT_PUBLIC_API_URL:
        required: true
      NEXT_PUBLIC_ORCID_API_URL:
        required: true
      SITEMAPS_URL:
        required: true
      CYPRESS_RECORD_KEY:
        required: true
      CYPRESS_USER_COOKIE:
        required: true
permissions:
  contents: read

jobs:
  cypress:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3, 4, 5, 6]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          install-command: yarn install --immutable
          package-manager-cache: false
          build: yarn build
          start: yarn start
          wait-on: 'http://localhost:3000'
          quiet: true
          record: true
          parallel: true
          group: 'Tests'
        env:
          CYPRESS_NODE_ENV: test
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_ORCID_API_URL: ${{ secrets.NEXT_PUBLIC_ORCID_API_URL }}
          SITEMAPS_URL: ${{ secrets.SITEMAPS_URL }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_USER_COOKIE: ${{ secrets.CYPRESS_USER_COOKIE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
